<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logic Creatures!</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 15px;
  user-select: none;
}
h1 {
  color: #fff;
  font-size: 2.4rem;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
  margin-bottom: 3px;
}
.subtitle {
  color: #ffd0e8;
  font-size: 1rem;
  margin-bottom: 12px;
}
.top-bar {
  display: flex;
  gap: 25px;
  color: #fff;
  font-size: 1.2rem;
  margin-bottom: 12px;
  background: rgba(255,255,255,0.15);
  padding: 7px 22px;
  border-radius: 20px;
}
.puzzle-title {
  color: #fff;
  font-size: 1.5rem;
  font-weight: bold;
  text-shadow: 1px 1px 3px rgba(0,0,0,0.3);
  margin-bottom: 10px;
  text-align: center;
}
.clue-box {
  background: rgba(255,255,255,0.92);
  border-radius: 18px;
  padding: 18px 25px;
  max-width: 650px;
  width: 100%;
  margin-bottom: 15px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.15);
}
.clue-box h3 {
  color: #9c27b0;
  margin-bottom: 10px;
  font-size: 1.2rem;
}
.clue {
  font-size: 1.15rem;
  color: #333;
  padding: 6px 0;
  border-bottom: 1px dashed #e0e0e0;
  line-height: 1.5;
}
.clue:last-child { border-bottom: none; }
.clue .clue-num {
  display: inline-block;
  background: #e91e63;
  color: #fff;
  border-radius: 50%;
  width: 26px;
  height: 26px;
  text-align: center;
  line-height: 26px;
  font-size: 0.85rem;
  font-weight: bold;
  margin-right: 8px;
}
.question-box {
  background: rgba(255,255,255,0.92);
  border-radius: 18px;
  padding: 18px 25px;
  max-width: 650px;
  width: 100%;
  margin-bottom: 12px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.15);
}
.question-box h3 {
  color: #e91e63;
  margin-bottom: 12px;
  font-size: 1.2rem;
}
.assign-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 10px;
  flex-wrap: wrap;
}
.role-label {
  font-size: 1.15rem;
  font-weight: bold;
  color: #555;
  min-width: 130px;
}
.choice-btn {
  padding: 10px 20px;
  font-size: 1.1rem;
  border: 3px solid #ddd;
  border-radius: 15px;
  cursor: pointer;
  background: #fff;
  transition: all 0.15s;
  font-weight: 600;
  color: #555;
}
.choice-btn:hover {
  border-color: #e91e63;
  background: #fce4ec;
}
.choice-btn.selected {
  border-color: #9c27b0;
  background: #f3e5f5;
  color: #9c27b0;
}
.choice-btn.correct {
  border-color: #4CAF50;
  background: #e8f5e9;
  color: #2e7d32;
}
.choice-btn.wrong {
  border-color: #f44336;
  background: #ffebee;
  color: #c62828;
}
.choice-btn.disabled {
  opacity: 0.5;
  cursor: default;
}
.feedback {
  color: #fff;
  font-size: 1.4rem;
  text-align: center;
  min-height: 40px;
  font-weight: bold;
  text-shadow: 1px 1px 3px rgba(0,0,0,0.3);
  margin-bottom: 10px;
}
.btn-row { display: flex; gap: 15px; justify-content: center; margin-bottom: 10px; }
.btn {
  padding: 12px 35px;
  font-size: 1.2rem;
  border: none;
  border-radius: 30px;
  cursor: pointer;
  font-weight: bold;
  transition: transform 0.1s;
  box-shadow: 0 3px 10px rgba(0,0,0,0.2);
}
.btn:hover { transform: scale(1.05); }
.btn-check { background: linear-gradient(135deg, #ffd93d, #ff6b6b); color: #fff; }
.btn-next { background: linear-gradient(135deg, #a18cd1, #fbc2eb); color: #333; display: none; }
.btn-restart { background: linear-gradient(135deg, #43e97b, #38f9d7); color: #333; }
.end-screen { display: none; flex-direction: column; align-items: center; gap: 15px; }
.end-screen h2 { color: #fff; font-size: 2.5rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
.creature-intro {
  display: flex;
  gap: 15px;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 12px;
}
.creature-card {
  background: #fff;
  border-radius: 15px;
  padding: 10px 18px;
  text-align: center;
  box-shadow: 0 3px 10px rgba(0,0,0,0.12);
  min-width: 90px;
}
.creature-card .emoji { font-size: 2.2rem; }
.creature-card .name { font-weight: bold; color: #9c27b0; font-size: 1.1rem; margin-top: 3px; }
.back-link {
  position: fixed;
  top: 12px;
  left: 12px;
  text-decoration: none;
  font-size: 11pt;
  padding: 6px 14px;
  border-radius: 20px;
  z-index: 1000;
  opacity: 0.7;
  transition: opacity 0.2s;
  background: rgba(240,147,251,0.6);
  color: #fff;
}
.back-link:hover { opacity: 1; }
.btn-hint {
  padding: 10px 25px;
  font-size: 1.1rem;
  border: none;
  border-radius: 25px;
  cursor: pointer;
  font-weight: bold;
  background: rgba(255,255,255,0.25);
  color: #fff;
  transition: transform 0.1s, background 0.2s;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}
.btn-hint:hover { transform: scale(1.05); background: rgba(255,255,255,0.4); }
.btn-hint:disabled { opacity: 0.4; cursor: default; transform: none; }
.btn-reset-progress {
  background: none;
  border: 1px solid rgba(255,255,255,0.3);
  color: rgba(255,255,255,0.5);
  font-size: 0.8rem;
  padding: 4px 12px;
  border-radius: 12px;
  cursor: pointer;
  transition: color 0.2s, border-color 0.2s;
  margin-left: 10px;
}
.btn-reset-progress:hover { color: #fff; border-color: rgba(255,255,255,0.7); }
.hint-box {
  background: rgba(255,255,255,0.2);
  border-radius: 12px;
  padding: 10px 18px;
  color: #fff;
  font-size: 1rem;
  max-width: 650px;
  width: 100%;
  text-align: center;
  margin-bottom: 10px;
  line-height: 1.4;
}
.assign-row.kb-focus-row {
  outline: 3px solid #ffd740;
  outline-offset: 3px;
  border-radius: 12px;
  box-shadow: 0 0 14px 3px rgba(255,215,64,0.4);
  animation: kbPulse 1.2s ease-in-out infinite;
}
.choice-btn.kb-focus-btn {
  outline: 3px solid #ffd740;
  outline-offset: 2px;
  box-shadow: 0 0 12px 3px rgba(255,215,64,0.5);
}
@keyframes kbPulse {
  0%, 100% { outline-color: #ffd740; }
  50% { outline-color: #ffab00; }
}
.kb-legend {
  color: rgba(255,255,255,0.55);
  font-size: 0.8rem;
  margin-top: 10px;
  text-align: center;
  line-height: 1.6;
}
</style>
</head>
<body>
<a href="index.html" class="back-link">&larr; All Games</a>
<h1>Logic Creatures!</h1>
<p class="subtitle">Read the clues and figure out who is who!</p>
<div class="top-bar">
  <span>Puzzle: <span id="puzzleNum">1</span> / <span id="totalPuzzles">8</span></span>
  <span>Score: <span id="score">0</span></span>
  <button class="btn-reset-progress" onclick="resetProgress()">Reset Progress</button>
</div>

<div id="gameArea">
  <div class="puzzle-title" id="puzzleTitle"></div>
  <div class="creature-intro" id="creatures"></div>
  <div class="clue-box" id="clueBox"><h3>Clues:</h3><div id="clues"></div></div>
  <div class="question-box" id="questionBox"><h3>Who is who?</h3><div id="assignments"></div></div>
  <div class="feedback" id="feedback"></div>
  <div id="hintDisplay"></div>
  <div class="btn-row">
    <button class="btn-hint" id="hintBtn" onclick="useHint()">Hint (<span id="hintsLeft">2</span> left)</button>
    <button class="btn btn-check" id="checkBtn" onclick="checkAnswer()">Check Answer!</button>
    <button class="btn btn-next" id="nextBtn" onclick="nextPuzzle()">Next Puzzle</button>
  </div>
</div>

<div class="kb-legend" id="kbLegend" style="display:none">
  ⌨ ←/→ move between rows &bull; ↑/↓ cycle creature choices &bull; Enter = Check &bull; H = Hint &bull; N = Next
</div>

<div class="end-screen" id="endScreen">
  <h2>You solved them all!</h2>
  <div style="color:#ffd54f;font-size:2rem" id="finalScore"></div>
  <button class="btn btn-restart" onclick="restart()">Play Again!</button>
</div>

<script>
const puzzles = [
  {
    title: "The Tallest Creature",
    creatures: [{name:"Gobr",emoji:"👾"},{name:"Stoon",emoji:"👽"},{name:"Plim",emoji:"🤖"}],
    clues: [
      "Gobr is taller than Stoon.",
      "Plim is taller than Gobr.",
      "The <b>tallest</b> creature wins the prize!"
    ],
    roles: ["Tallest"],
    answer: {Tallest:"Plim"},
    hints: ["Based on Clue 2, Plim is taller than Gobr, who is already taller than Stoon.", "So Plim must be the tallest of all three!"]
  },
  {
    title: "Who Lives Where?",
    creatures: [{name:"Zix",emoji:"🐲"},{name:"Moop",emoji:"🦊"},{name:"Tark",emoji:"🐸"}],
    clues: [
      "Zix does NOT live in the cave.",
      "Moop lives in the tree.",
      "One creature lives in the cave, one in the tree, and one in the pond."
    ],
    roles: ["Lives in the cave","Lives in the tree","Lives in the pond"],
    answer: {"Lives in the cave":"Tark","Lives in the tree":"Moop","Lives in the pond":"Zix"},
    hints: ["Based on Clue 2, Moop lives in the tree.", "Based on Clue 1, Zix does NOT live in the cave, so Zix must live in the pond."]
  },
  {
    title: "The Booter",
    creatures: [{name:"Wug",emoji:"👹"},{name:"Blik",emoji:"👻"},{name:"Narg",emoji:"🎃"}],
    clues: [
      "The <b>booter</b> has the most legs.",
      "Wug has 2 legs.",
      "Blik has 4 legs.",
      "Narg has 6 legs."
    ],
    roles: ["The booter"],
    answer: {"The booter":"Narg"},
    hints: ["Based on Clue 1, the booter has the MOST legs.", "Narg has 6 legs, which is more than Wug (2) and Blik (4)."]
  },
  {
    title: "Favorite Colors",
    creatures: [{name:"Flub",emoji:"🧸"},{name:"Dree",emoji:"🐙"},{name:"Pex",emoji:"🦋"}],
    clues: [
      "Flub does NOT like red.",
      "Dree does NOT like blue.",
      "Pex likes green.",
      "Each creature likes a different color: red, blue, or green."
    ],
    roles: ["Likes red","Likes blue","Likes green"],
    answer: {"Likes red":"Dree","Likes blue":"Flub","Likes green":"Pex"},
    hints: ["Based on Clue 3, Pex likes green.", "Based on Clue 1, Flub does NOT like red, so Flub must like blue."]
  },
  {
    title: "Who Ate the Cookie?",
    creatures: [{name:"Zorp",emoji:"👿"},{name:"Quib",emoji:"🤡"},{name:"Lunt",emoji:"🧛"},{name:"Feep",emoji:"🧞"}],
    clues: [
      "The cookie thief has pointy ears.",
      "Zorp and Quib do NOT have pointy ears.",
      "Lunt was sleeping when the cookie vanished.",
      "Only one creature ate the cookie."
    ],
    roles: ["Ate the cookie"],
    answer: {"Ate the cookie":"Feep"},
    hints: ["Based on Clue 2, Zorp and Quib don't have pointy ears, so they can't be the thief.", "Based on Clue 3, Lunt was sleeping, so Lunt didn't eat it either."]
  },
  {
    title: "Race Finish Order",
    creatures: [{name:"Blip",emoji:"🚀"},{name:"Grun",emoji:"🛸"},{name:"Yop",emoji:"🛩️"}],
    clues: [
      "Grun did NOT finish last.",
      "Blip finished after Grun.",
      "Yop finished after Blip.",
      "Each creature finished in a different place: 1st, 2nd, or 3rd."
    ],
    roles: ["1st place","2nd place","3rd place"],
    answer: {"1st place":"Grun","2nd place":"Blip","3rd place":"Yop"},
    hints: ["Based on Clue 2, Blip finished after Grun, so Grun is ahead of Blip.", "Based on Clue 3, Yop finished after Blip, so the order is Grun, Blip, Yop."]
  },
  {
    title: "The Three Hats",
    creatures: [{name:"Snig",emoji:"🎅"},{name:"Boff",emoji:"🧙"},{name:"Tumm",emoji:"🤠"}],
    clues: [
      "There are three hats: one red, one blue, one yellow.",
      "Snig says: \"My hat is NOT blue.\"",
      "Boff says: \"My hat is NOT blue and NOT red.\"",
      "Each creature wears a different hat."
    ],
    roles: ["Red hat","Blue hat","Yellow hat"],
    answer: {"Red hat":"Snig","Blue hat":"Tumm","Yellow hat":"Boff"},
    hints: ["Based on Clue 3, Boff's hat is NOT blue and NOT red, so it must be yellow.", "Based on Clue 2, Snig's hat is NOT blue, so Snig must have the red hat."]
  },
  {
    title: "Pets and Owners",
    creatures: [{name:"Frax",emoji:"🧝"},{name:"Dool",emoji:"🧚"},{name:"Venn",emoji:"🧜"},{name:"Kip",emoji:"🧙"}],
    clues: [
      "Each creature has a different pet: a cat, a dog, a fish, or a bird.",
      "Frax is allergic to fur (so no cat or dog).",
      "Dool's pet can fly.",
      "Venn's pet says \"woof!\"",
      "Kip does NOT have a fish."
    ],
    roles: ["Has the cat","Has the dog","Has the fish","Has the bird"],
    answer: {"Has the cat":"Kip","Has the dog":"Venn","Has the fish":"Frax","Has the bird":"Dool"},
    hints: ["Based on Clue 3, Dool's pet can fly, so Dool has the bird.", "Based on Clue 4, Venn's pet says 'woof!', so Venn has the dog."]
  }
];

let currentPuzzle = 0;
let score = 0;
let selections = {};
let answered = false;
let hintsUsed = 0;
let completedPuzzles = [];

// --- Session Persistence ---
const STORAGE_KEY = 'mathCircle_03_progress';

function saveProgress() {
  const data = { completedPuzzles, score };
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) {}
}

function loadProgress() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    if (data && Array.isArray(data.completedPuzzles)) {
      completedPuzzles = data.completedPuzzles;
      score = data.score || 0;
      let next = 0;
      for (let i = 0; i < puzzles.length; i++) {
        if (!completedPuzzles.includes(i)) { next = i; break; }
        if (i === puzzles.length - 1) next = puzzles.length;
      }
      currentPuzzle = next;
      document.getElementById('score').textContent = score;
    }
  } catch(e) {}
}

function resetProgress() {
  localStorage.removeItem(STORAGE_KEY);
  completedPuzzles = [];
  currentPuzzle = 0;
  score = 0;
  document.getElementById('score').textContent = 0;
  document.getElementById('endScreen').style.display = 'none';
  document.getElementById('gameArea').style.display = '';
  renderPuzzle();
}

// --- Hint System ---
function useHint() {
  if (hintsUsed >= 2 || answered) return;
  const p = puzzles[currentPuzzle];
  if (!p.hints || hintsUsed >= p.hints.length) return;

  const hintText = p.hints[hintsUsed];
  hintsUsed++;
  document.getElementById('hintsLeft').textContent = 2 - hintsUsed;
  if (hintsUsed >= 2) {
    document.getElementById('hintBtn').disabled = true;
  }

  const display = document.getElementById('hintDisplay');
  const box = document.createElement('div');
  box.className = 'hint-box';
  box.textContent = hintText;
  display.appendChild(box);
}

function renderPuzzle() {
  answered = false;
  selections = {};
  hintsUsed = 0;
  document.getElementById('hintBtn').disabled = false;
  document.getElementById('hintBtn').style.display = '';
  document.getElementById('hintsLeft').textContent = '2';
  document.getElementById('hintDisplay').innerHTML = '';
  const p = puzzles[currentPuzzle];
  document.getElementById('puzzleNum').textContent = currentPuzzle + 1;
  document.getElementById('totalPuzzles').textContent = puzzles.length;
  document.getElementById('puzzleTitle').textContent = p.title;
  document.getElementById('feedback').textContent = '';
  document.getElementById('nextBtn').style.display = 'none';
  document.getElementById('checkBtn').style.display = '';

  // Creatures display
  const cc = document.getElementById('creatures');
  cc.innerHTML = '';
  p.creatures.forEach(c => {
    const card = document.createElement('div');
    card.className = 'creature-card';
    card.innerHTML = `<div class="emoji">${c.emoji}</div><div class="name">${c.name}</div>`;
    cc.appendChild(card);
  });

  // Clues
  const cl = document.getElementById('clues');
  cl.innerHTML = '';
  p.clues.forEach((c, i) => {
    const d = document.createElement('div');
    d.className = 'clue';
    d.innerHTML = `<span class="clue-num">${i+1}</span> ${c}`;
    cl.appendChild(d);
  });

  // Assignment rows
  const asg = document.getElementById('assignments');
  asg.innerHTML = '';
  p.roles.forEach(role => {
    const row = document.createElement('div');
    row.className = 'assign-row';
    const label = document.createElement('span');
    label.className = 'role-label';
    label.textContent = role + ':';
    row.appendChild(label);

    p.creatures.forEach(c => {
      const btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.textContent = c.emoji + ' ' + c.name;
      btn.dataset.role = role;
      btn.dataset.creature = c.name;
      btn.addEventListener('click', () => selectChoice(role, c.name, btn));
      row.appendChild(btn);
    });
    asg.appendChild(row);
  });
}

function selectChoice(role, creature, btn) {
  if (answered) return;
  // Deselect previous for this role
  const row = btn.parentElement;
  row.querySelectorAll('.choice-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selections[role] = creature;
}

function checkAnswer() {
  if (answered) return;
  const p = puzzles[currentPuzzle];

  // Check all roles assigned
  for (const role of p.roles) {
    if (!selections[role]) {
      document.getElementById('feedback').textContent = "Pick an answer for each row first!";
      return;
    }
  }

  let allCorrect = true;
  const allBtns = document.querySelectorAll('.choice-btn');

  p.roles.forEach(role => {
    allBtns.forEach(btn => {
      if (btn.dataset.role === role) {
        btn.classList.add('disabled');
        if (btn.dataset.creature === p.answer[role]) {
          btn.classList.add('correct');
        }
        if (btn.classList.contains('selected') && btn.dataset.creature !== p.answer[role]) {
          btn.classList.add('wrong');
          allCorrect = false;
        }
      }
    });
  });

  answered = true;
  document.getElementById('hintBtn').style.display = 'none';
  if (allCorrect) {
    score++;
    document.getElementById('score').textContent = score;
    if (!completedPuzzles.includes(currentPuzzle)) completedPuzzles.push(currentPuzzle);
    saveProgress();
    const msgs = ["You figured it out! 🧠","Logic master! ⭐","Brilliant deduction! 🌟","Amazing thinking! 🎉"];
    document.getElementById('feedback').textContent = msgs[Math.floor(Math.random()*msgs.length)];
  } else {
    document.getElementById('feedback').textContent = "Not quite! The green ones show the right answers. Keep thinking! 💪";
  }
  document.getElementById('checkBtn').style.display = 'none';
  document.getElementById('nextBtn').style.display = 'inline-block';
}

function nextPuzzle() {
  currentPuzzle++;
  if (currentPuzzle >= puzzles.length) {
    showEnd();
    return;
  }
  renderPuzzle();
}

function showEnd() {
  document.getElementById('hintBtn').style.display = 'none';
  document.getElementById('gameArea').style.display = 'none';
  const end = document.getElementById('endScreen');
  end.style.display = 'flex';
  document.getElementById('finalScore').textContent =
    `You got ${score} out of ${puzzles.length} correct! ${'⭐'.repeat(Math.min(score, 8))}`;
}

function restart() {
  currentPuzzle = 0;
  score = 0;
  completedPuzzles = [];
  document.getElementById('score').textContent = 0;
  document.getElementById('endScreen').style.display = 'none';
  document.getElementById('gameArea').style.display = '';
  saveProgress();
  renderPuzzle();
}

// --- Keyboard Navigation ---
let kbRoleIndex = -1;
let kbCreatureIndex = -1;

function getAssignRows() {
  return document.querySelectorAll('.assign-row');
}

function updateKbFocus03() {
  const rows = getAssignRows();
  rows.forEach(r => r.classList.remove('kb-focus-row'));
  document.querySelectorAll('.choice-btn').forEach(b => b.classList.remove('kb-focus-btn'));

  if (kbRoleIndex < 0 || kbRoleIndex >= rows.length) return;
  rows[kbRoleIndex].classList.add('kb-focus-row');

  const btns = rows[kbRoleIndex].querySelectorAll('.choice-btn');
  if (kbCreatureIndex >= 0 && kbCreatureIndex < btns.length) {
    btns[kbCreatureIndex].classList.add('kb-focus-btn');
  }
}

document.addEventListener('keydown', function(e) {
  if (e.ctrlKey || e.altKey || e.metaKey) return;
  if (answered && e.key !== 'n' && e.key !== 'N') return;

  const rows = getAssignRows();
  if (!rows.length && e.key !== 'n' && e.key !== 'N') return;
  const p = puzzles[currentPuzzle];
  if (!p) return;
  const creatureCount = p.creatures.length;

  switch (e.key) {
    case 'ArrowDown':
    case 'ArrowRight':
      e.preventDefault();
      if (e.key === 'ArrowDown') {
        // Cycle creature within focused row
        if (kbRoleIndex < 0) { kbRoleIndex = 0; kbCreatureIndex = 0; }
        else { kbCreatureIndex = (kbCreatureIndex + 1) % creatureCount; }
      } else {
        // Move to next role row
        if (kbRoleIndex < 0) { kbRoleIndex = 0; kbCreatureIndex = 0; }
        else { kbRoleIndex = (kbRoleIndex + 1) % rows.length; kbCreatureIndex = Math.max(kbCreatureIndex, 0); }
      }
      updateKbFocus03();
      break;
    case 'ArrowUp':
    case 'ArrowLeft':
      e.preventDefault();
      if (e.key === 'ArrowUp') {
        if (kbRoleIndex < 0) { kbRoleIndex = 0; kbCreatureIndex = creatureCount - 1; }
        else { kbCreatureIndex = (kbCreatureIndex - 1 + creatureCount) % creatureCount; }
      } else {
        if (kbRoleIndex < 0) { kbRoleIndex = rows.length - 1; kbCreatureIndex = 0; }
        else { kbRoleIndex = (kbRoleIndex - 1 + rows.length) % rows.length; kbCreatureIndex = Math.max(kbCreatureIndex, 0); }
      }
      updateKbFocus03();
      break;
    case 'Enter':
    case ' ':
      e.preventDefault();
      if (kbRoleIndex >= 0 && kbCreatureIndex >= 0) {
        var btns = rows[kbRoleIndex].querySelectorAll('.choice-btn');
        if (btns[kbCreatureIndex]) btns[kbCreatureIndex].click();
      } else if (e.key === 'Enter') {
        checkAnswer();
      }
      break;
    case 'h':
    case 'H':
      e.preventDefault();
      useHint();
      break;
    case 'n':
    case 'N':
      e.preventDefault();
      var nextBtnEl = document.getElementById('nextBtn');
      if (nextBtnEl && nextBtnEl.style.display !== 'none') {
        nextPuzzle();
      }
      break;
  }
});

// Reset focus on new puzzle
const origRenderPuzzle = renderPuzzle;
renderPuzzle = function() {
  origRenderPuzzle();
  kbRoleIndex = -1;
  kbCreatureIndex = -1;
};

// Show keyboard legend on non-touch devices
if (!('ontouchstart' in window)) {
  document.getElementById('kbLegend').style.display = '';
}

loadProgress();
if (currentPuzzle >= puzzles.length) {
  showEnd();
} else {
  renderPuzzle();
}
</script>

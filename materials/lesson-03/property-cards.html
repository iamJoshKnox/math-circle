<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Property Cards — Math Circle Lesson 3</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Arial Rounded MT Bold', Arial, sans-serif;
    background: #fff;
  }

  .page {
    width: 8.5in;
    height: 11in;
    padding: 0.4in 0.45in;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(4, 1fr);
    gap: 0;
  }

  .card-wrapper {
    padding: 6px;
    position: relative;
  }

  /* Dashed cut lines via border on wrapper */
  .card-wrapper::after {
    content: '';
    position: absolute;
    inset: 0;
    border: 2px dashed #aaa;
    pointer-events: none;
  }

  .card {
    width: 100%;
    height: 100%;
    border-radius: 14px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 10px 8px;
    gap: 8px;
  }

  .card-icon {
    font-size: 30pt;
    line-height: 1;
  }

  .card-label {
    font-size: 28pt;
    font-weight: 900;
    text-align: center;
    line-height: 1.05;
    letter-spacing: 1px;
  }

  /* Colors — cycling through a fun palette */
  .c0  { background: #fff9c4; }  .c0  .card-label { color: #f57f17; }
  .c1  { background: #f8bbd0; }  .c1  .card-label { color: #880e4f; }
  .c2  { background: #c8e6c9; }  .c2  .card-label { color: #1b5e20; }
  .c3  { background: #b3e5fc; }  .c3  .card-label { color: #01579b; }
  .c4  { background: #ffe0b2; }  .c4  .card-label { color: #bf360c; }
  .c5  { background: #e1bee7; }  .c5  .card-label { color: #4a148c; }
  .c6  { background: #dcedc8; }  .c6  .card-label { color: #33691e; }
  .c7  { background: #fce4ec; }  .c7  .card-label { color: #c62828; }
  .c8  { background: #e0f7fa; }  .c8  .card-label { color: #006064; }
  .c9  { background: #fff3e0; }  .c9  .card-label { color: #e65100; }
  .c10 { background: #ede7f6; }  .c10 .card-label { color: #311b92; }
  .c11 { background: #e8f5e9; }  .c11 .card-label { color: #2e7d32; }

  @media print {
    body { background: #fff; }
    .page {
      width: 8.5in;
      height: 11in;
      margin: 0;
    }
    @page { size: 8.5in 11in; margin: 0; }
  }
</style>
</head>
<body>

<div class="page">

  <div class="card-wrapper">
    <div class="card c0">
      <div class="card-icon">🥾</div>
      <div class="card-label">booter</div>
    </div>
  </div>

  <div class="card-wrapper">
    <div class="card c1">
      <div class="card-icon">✨</div>
      <div class="card-label">snig</div>
    </div>
  </div>

  <div class="card-wrapper">
    <div class="card c2">
      <div class="card-icon">🎵</div>
      <div class="card-label">plonk</div>
    </div>
  </div>

  <div class="card-wrapper">
    <div class="card c3">
      <div class="card-icon">🏔️</div>
      <div class="card-label">tallest</div>
    </div>
  </div>

  <div class="card-wrapper">
    <div class="card c4">
      <div class="card-icon">🐛</div>
      <div class="card-label">shortest</div>
    </div>
  </div>

  <div class="card-wrapper">
    <div class="card c5">
      <div class="card-icon">⚡</div>
      <div class="card-label">fastest</div>
    </div>
  </div>

  <div class="card-wrapper">
    <div class="card c6">
      <div class="card-icon">🐢</div>
      <div class="card-label">slowest</div>
    </div>
  </div>

  <div class="card-wrapper">
    <div class="card c7">
      <div class="card-icon">🧓</div>
      <div class="card-label">oldest</div>
    </div>
  </div>

  <div class="card-wrapper">
    <div class="card c8">
      <div class="card-icon">🌱</div>
      <div class="card-label">youngest</div>
    </div>
  </div>

  <div class="card-wrapper">
    <div class="card c9">
      <div class="card-icon">🍕</div>
      <div class="card-label">hungriest</div>
    </div>
  </div>

  <div class="card-wrapper">
    <div class="card c10">
      <div class="card-icon">💤</div>
      <div class="card-label">sleepiest</div>
    </div>
  </div>

  <div class="card-wrapper">
    <div class="card c11">
      <div class="card-icon">💪</div>
      <div class="card-label">strongest</div>
    </div>
  </div>

</div>

</body>
</html>
